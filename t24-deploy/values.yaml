replicaCount: 2

image:
  repository: t24acr1958.azurecr.io/t24-app
  pullPolicy: Always
  tag: "1.0"

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
readinessProbe:
  httpGet:
    path: /health
    port: 8080

autoscaling:
  enabled: false

ingress:
  enabled: false

serviceAccount:
  create: true
  name: ""

podLabels: {}
podAnnotations: {}
podSecurityContext: {}
securityContext: {}
nodeSelector: {}
tolerations: []
affinity: {}
volumes: []
volumeMounts: []
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
